name: release-from-tag

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping non-semver tag: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Render release showcase
        env:
          RELEASE_SHOWCASE_OUT_DIR: release-showcase
        run: node scripts/render-release-showcase.mjs

      - name: Prepare release body
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat <<EOF > release-body.md
          Automated release for \\`${TAG_NAME}\\`.

          ## Showcase

          ### xhs-note
          ![xhs-note](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/xhs-note.png)

          ### xhs-note-green
          ![xhs-note-green](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/xhs-note-green.png)

          ### xhs-quote-blue
          ![xhs-quote-blue](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/xhs-quote-blue.png)

          ### apple-notes-handwrite
          ![apple-notes-handwrite](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/apple-notes-handwrite.png)
          EOF

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: |
            release-showcase/xhs-note.png
            release-showcase/xhs-note-green.png
            release-showcase/xhs-quote-blue.png
            release-showcase/apple-notes-handwrite.png
            release-showcase/manifest.json
          fail_on_unmatched_files: true
          append_body: false
          make_latest: true
