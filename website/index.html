<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>postgen template shots</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 28px; color: #94a3b8; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
      }
      .card {
        background: #111827;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      }
      .card img {
        display: block;
        width: 100%;
        height: auto;
        background: #0b1220;
      }
      .meta {
        padding: 14px 16px 16px;
      }
      .meta strong {
        display: block;
        font-size: 15px;
        margin-bottom: 6px;
      }
      .meta code {
        color: #93c5fd;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>postgen template shots</h1>
      <p>当前预览图已切到更自然的中文 demo 文案，方便直接看模板的真实表现。</p>
      <div class="grid">
        <div class="card"><img src="./shots/xhs-note.png" alt="xhs-note cream" /><div class="meta"><strong>xhs-note / cream</strong><code>website/data/xhs-note.json</code></div></div>
        <div class="card"><img src="./shots/xhs-note-blue.png" alt="xhs-note blue" /><div class="meta"><strong>xhs-note / blue</strong><code>website/data/xhs-note-blue.json</code></div></div>
        <div class="card"><img src="./shots/xhs-note-green.png" alt="xhs-note-green" /><div class="meta"><strong>xhs-note-green</strong><code>website/data/xhs-note-green.json</code></div></div>
        <div class="card"><img src="./shots/xhs-quote-blue.png" alt="xhs-quote-blue" /><div class="meta"><strong>xhs-quote-blue</strong><code>website/data/xhs-quote-blue.json</code></div></div>
        <div class="card"><img src="./shots/xhs-date-note.png" alt="xhs-date-note" /><div class="meta"><strong>xhs-date-note</strong><code>website/data/xhs-date-note.json</code></div></div>
      </div>
    </div>
  </body>
</html>
